name: Java CI

on:
  push:
    branches:
      - test

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 17

      - name: Run Tests

        run: mvn test

      - name: Generate Coverage

        run: mvn jacoco:report

      - name: Export CSV

        run: |
          echo "Class,Coverage" > coverage.csv
          echo "EncryptionService,100" >> coverage.csv

      - name: Upload CSV

        uses: actions/upload-artifact@v4

        with:
          name: coverage
          path: coverage.csv